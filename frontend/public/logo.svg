<svg viewBox="0 0 2000 2000" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="3ISTOR SIGL logo">
  <defs>
    <filter id="circShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#003a45" flood-opacity="0.35"/>
    </filter>
    <filter id="traceShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="7" dy="9" stdDeviation="2" flood-color="#001026" flood-opacity="0.55"/>
    </filter>
    <filter id="boxShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#1b0a55" flood-opacity="0.4"/>
    </filter>
    <filter id="glyphShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="3" dy="4" stdDeviation="0" flood-color="#0a1f4d" flood-opacity="0.75"/>
    </filter>
  </defs>

  <!-- teal disc -->
  <circle cx="1000" cy="1000" r="995" fill="#0097b2" filter="url(#circShadow)"/>

  <!-- PCB traces -->
  <g fill="none" stroke="#0b2f6b" stroke-width="40" stroke-linecap="butt" stroke-linejoin="round" filter="url(#traceShadow)">
    <path d="M 826 1120 V 1272 H 565 V 1135 H 445"/>
    <path d="M 318 1000 H 445 V 1272 H 246"/>
    <path d="M 996 1120 V 1338"/>
    <path d="M 845 1606 V 1338 H 1141 V 1606"/>
    <path d="M 1166 1120 V 1272 H 1375 V 1130 H 1555"/>
    <path d="M 1700 1000 H 1555 V 1272 H 1752"/>
  </g>

  <!-- transistor metal tab -->
  <g filter="url(#boxShadow)">
    <rect x="746" y="312" width="506" height="232" rx="14" fill="#9bc7f1"/>
    <rect x="746" y="312" width="506" height="40" rx="14" fill="#aed1f4"/>
    <rect x="770" y="498" width="320" height="8" rx="4" fill="#86b3e6" opacity="0.7"/>
    <rect x="770" y="470" width="240" height="6" rx="3" fill="#86b3e6" opacity="0.5"/>
    <circle cx="991" cy="406" r="58" fill="#d1e3f5"/>
    <circle cx="977" cy="392" r="20" fill="#e7f1fb" opacity="0.8"/>
  </g>

  <!-- transistor plastic body -->
  <g filter="url(#boxShadow)">
    <rect x="722" y="540" width="572" height="578" rx="16" fill="#5e17eb"/>
    <path d="M 740 560 L 740 1100" stroke="#7437f0" stroke-width="6" fill="none" opacity="0.7"/>
    <path d="M 1232 560 L 1232 1100" stroke="#4d0fce" stroke-width="6" fill="none" opacity="0.6"/>
    <path d="M 740 600 L 800 540" stroke="#7d44f2" stroke-width="5" fill="none" opacity="0.6"/>
  </g>

  <!-- body text -->
  <g fill="#eef4fb" font-family="'Press Start 2P', monospace" filter="url(#glyphShadow)">
    <text x="1008" y="730" text-anchor="middle" font-size="84" textLength="296" lengthAdjust="spacingAndGlyphs">3ISTOR</text>
    <text x="1008" y="958" text-anchor="middle" font-size="84" textLength="210" lengthAdjust="spacingAndGlyphs">SIGL</text>
  </g>
  <line x1="838" y1="812" x2="1182" y2="812" stroke="#c9b8f7" stroke-width="5"/>
  <text x="1008" y="1092" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="30" fill="#eaf0f9" font-style="italic">The excellence since 2026</text>

  <!-- pin labels -->
  <g fill="#d1e3f5" font-family="'Press Start 2P', monospace" font-size="66" text-anchor="middle" filter="url(#glyphShadow)">
    <text x="306" y="1018">H</text>
    <text x="246" y="1278">N</text>
    <text x="845" y="1652">A</text>
    <text x="1110" y="1652">J</text>
    <text x="1702" y="1018">B</text>
    <text x="1750" y="1278">R</text>
  </g>
</svg>
