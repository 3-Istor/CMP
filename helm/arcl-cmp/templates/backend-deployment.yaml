apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "arcl-cmp.fullname" . }}-backend
  labels:
    {{- include "arcl-cmp.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "arcl-cmp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "arcl-cmp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "arcl-cmp.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: backend
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
        imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: DATABASE_URL
          value: {{ .Values.env.backend.DATABASE_URL | quote }}
        - name: OS_AUTH_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "arcl-cmp.fullname" . }}-secret
              key: os-auth-url
        - name: OS_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ include "arcl-cmp.fullname" . }}-secret
              key: os-username
        - name: OS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "arcl-cmp.fullname" . }}-secret
              key: os-password
        - name: OS_PROJECT_NAME
          valueFrom:
            secretKeyRef:
              name: {{ include "arcl-cmp.fullname" . }}-secret
              key: os-project-name
        - name: OS_USER_DOMAIN_NAME
          value: {{ .Values.env.backend.OS_USER_DOMAIN_NAME | quote }}
        - name: OS_PROJECT_DOMAIN_NAME
          value: {{ .Values.env.backend.OS_PROJECT_DOMAIN_NAME | quote }}
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "arcl-cmp.fullname" . }}-secret
              key: aws-access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "arcl-cmp.fullname" . }}-secret
              key: aws-secret-access-key
        - name: AWS_DEFAULT_REGION
          value: {{ .Values.env.backend.AWS_DEFAULT_REGION | quote }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          {{- toYaml .Values.resources.backend | nindent 12 }}
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: db
          mountPath: /app/arcl.db
          subPath: arcl.db
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "arcl-cmp.fullname" . }}-backend-data
      - name: db
        persistentVolumeClaim:
          claimName: {{ include "arcl-cmp.fullname" . }}-backend-db
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
