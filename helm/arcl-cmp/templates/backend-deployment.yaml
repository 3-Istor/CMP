apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "arcl-cmp.fullname" . }}-backend
  labels:
    {{- include "arcl-cmp.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "arcl-cmp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "arcl-cmp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "arcl-cmp.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
      - name: init-db-dir
        image: busybox:latest
        command: ['sh', '-c', 'mkdir -p /app/db && chmod 777 /app/db']
        volumeMounts:
        - name: db-storage
          mountPath: /app/db
      containers:
      - name: backend
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
        imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
        ports:
        - name: http
          containerPort: 8000
                protocol: TCP
              env:
              - name: DATABASE_URL
                value: {{ .Values.env.backend.DATABASE_URL | quote }}
              - name: OS_AUTH_URL
                valueFrom:
                  secretKeyRef:
                    name: {{ include "arcl-cmp.fullname" . }}-secret
                    key: os-auth-url
              - name: OS_USERNAME
                valueFrom:
                  secretKeyRef:
                    name: {{ include "arcl-cmp.fullname" . }}-secret
                    key: os-username
              - name: OS_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: {{ include "arcl-cmp.fullname" . }}-secret
                    key: os-password
              - name: OS_PROJECT_NAME
                valueFrom:
                  secretKeyRef:
                    name: {{ include "arcl-cmp.fullname" . }}-secret
                    key: os-project-name
              - name: OS_USER_DOMAIN_NAME
                valueFrom:
                  secretKeyRef:
                    name: {{ include "arcl-cmp.fullname" . }}-secret
                    key: os-user-domain-name
              - name: OS_PROJECT_DOMAIN_NAME
                valueFrom:
                  secretKeyRef:
                    name: {{ include "arcl-cmp.fullname" . }}-secret
                    key: os-project-domain-name
              - name: AWS_ACCESS_KEY_ID
                valueFrom:
                  secretKeyRef:
                    name: {{ include "arcl-cmp.fullname" . }}-secret
                    key: aws-access-key-id
              - name: AWS_SECRET_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: {{ include "arcl-cmp.fullname" . }}-secret
                    key: aws-secret-access-key
              - name: AWS_DEFAULT_REGION
                valueFrom:
                  secretKeyRef:
                    name: {{ include "arcl-cmp.fullname" . }}-secret
                    key: aws-region
              - name: TF_BACKEND_S3_ENABLED
                value: {{ .Values.env.backend.TF_BACKEND_S3_ENABLED | quote }}
              - name: TF_BACKEND_AWS_ACCESS_KEY_ID
                valueFrom:
                  secretKeyRef:
                    name: {{ include "arcl-cmp.fullname" . }}-secret
                    key: aws-access-key-id
              - name: TF_BACKEND_AWS_SECRET_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: {{ include "arcl-cmp.fullname" . }}-secret
                    key: aws-secret-access-key
              - name: TF_BACKEND_AWS_REGION
                valueFrom:
                  secretKeyRef:
                    name: {{ include "arcl-cmp.fullname" . }}-secret
                    key: aws-region
              - name: TF_BACKEND_S3_BUCKET
                valueFrom:
                  secretKeyRef:
                    name: {{ include "arcl-cmp.fullname" . }}-secret
                    key: aws-s3-bucket
              - name: TF_BACKEND_S3_KEY_PREFIX
                valueFrom:
                  secretKeyRef:
                    name: {{ include "arcl-cmp.fullname" . }}-secret
                    key: aws-s3-key-prefix
              - name: KEYCLOAK_URL
                value: "https://auth.3istor.com"
              - name: KEYCLOAK_CLIENT_ID
                value: "3-istor-openid"
              - name: KEYCLOAK_CLIENT_SECRET
                valueFrom:
                  secretKeyRef:
                    name: envoy-cmp-auth-secret
                    key: client-secret
              - name: AVATARS_S3_ACCESS_KEY_ID
                valueFrom:
                  secretKeyRef:
                    name: {{ include "arcl-cmp.fullname" . }}-secret
                    key: avatars-s3-access-key-id
              - name: AVATARS_S3_SECRET_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: {{ include "arcl-cmp.fullname" . }}-secret
                    key: avatars-s3-secret-access-key
              - name: AVATARS_S3_ENDPOINT
                valueFrom:
                  secretKeyRef:
                    name: {{ include "arcl-cmp.fullname" . }}-secret
                    key: avatars-s3-endpoint
              - name: AVATARS_S3_BUCKET
                valueFrom:
                  secretKeyRef:
                    name: {{ include "arcl-cmp.fullname" . }}-secret
                    key: avatars-s3-bucket
              - name: AVATARS_S3_REGION
                valueFrom:
                  secretKeyRef:
                    name: {{ include "arcl-cmp.fullname" . }}-secret
                    key: avatars-s3-region
              - name: AVATARS_PUBLIC_URL_BASE
                valueFrom:
                  secretKeyRef:
                    name: {{ include "arcl-cmp.fullname" . }}-secret
                    key: avatars-s3-public-url-base
              - name: CLOUDFLARE_API_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: {{ include "arcl-cmp.fullname" . }}-secret
                    key: cloudflare-api-token
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml .Values.resources.backend | nindent 12 }}
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: db-storage
          mountPath: /app/db
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "arcl-cmp.fullname" . }}-backend-data
      - name: db-storage
        persistentVolumeClaim:
          claimName: {{ include "arcl-cmp.fullname" . }}-backend-db
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
