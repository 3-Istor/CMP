apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "arcl-cmp.fullname" . }}-frontend
  labels:
    {{- include "arcl-cmp.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "arcl-cmp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "arcl-cmp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "arcl-cmp.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: frontend
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.frontend.repository }}:{{ .Values.image.frontend.tag }}"
        imagePullPolicy: {{ .Values.image.frontend.pullPolicy }}
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        env:
        - name: NEXT_PUBLIC_API_URL
          value: {{ .Values.frontend.apiUrl | quote }}
        - name: API_URL
          # Internal K8s DNS to avoid external routing loops for server-side NextAuth requests
          value: "http://{{ include "arcl-cmp.fullname" . }}-backend:8000/api"
        - name: NEXTAUTH_URL
          value: {{ .Values.frontend.authUrl | quote }}
        - name: AUTH_TRUST_HOST
          value: "true"
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: arcl-cmp-frontend-secret
              key: nextauth-secret
        - name: AUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: arcl-cmp-frontend-secret
              key: nextauth-secret
        - name: KEYCLOAK_CLIENT_ID
          value: "3-istor-openid"
        - name: KEYCLOAK_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: cmp-route-envoy-auth-secret
              key: client-secret
        - name: KEYCLOAK_ISSUER
          value: "https://auth.3istor.com/realms/3istor"
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          {{- toYaml .Values.resources.frontend | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
